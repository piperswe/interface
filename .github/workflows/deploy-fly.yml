name: Deploy sandbox to Fly.io

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - scripts/fly-entrypoint.sh
      - scripts/fly-preview-proxy.mjs
      - fly/fly.toml
      - .github/workflows/deploy-fly.yml

# Queue deploys rather than cancelling a live deployment mid-flight.
concurrency:
  group: deploy-fly
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Deploy
        run: flyctl deploy --config fly/fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
