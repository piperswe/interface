name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel previous runs for the same branch when a new push comes in.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & type-check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx biome ci --reporter=github .

      # `vitest-pool-workers` runs the test suite inside workerd, which needs
      # the binary downloaded by the wrangler postinstall step. `npm ci`
      # handles that — no separate setup is required.
      - name: Type-check
        run: npm run check

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build
