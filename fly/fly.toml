# fly.io app config for the sandbox backend.
#
# This declares a *single* app whose Machines are created on demand by
# the Worker (one per conversation). The Worker calls the Machines API
# directly — `flyctl deploy` is only used to publish the image to fly's
# registry; ongoing lifecycle (create / start / stop / destroy) is
# managed by `src/lib/server/sandbox/fly/lifecycle.ts`.
#
# Replace `app` with your fly app name and set the matching `FLY_APP_NAME`
# Worker secret.
app = "interface-sandbox"
primary_region = "sea"

[build]
  dockerfile = "../Dockerfile"
  build-target = "fly-final"

[[services]]
  protocol = "tcp"
  internal_port = 8080

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
    force_https = true

  [services.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250
